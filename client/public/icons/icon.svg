<?xml version="1.0" standalone="no"?>
<svg id="svg-logo-icon-full"
     width="200" height="200"
     viewBox="0 0 200 200"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">

  <defs>
    <radialGradient id="bgRadial" cx="50%" cy="45%" r="75%">
      <stop offset="0%"  stop-color="#4B4B4B"/>
      <stop offset="55%" stop-color="#3B3B3B"/>
      <stop offset="100%" stop-color="#2E2E2E"/>
    </radialGradient>

    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#000" flood-opacity="0.22"/>
    </filter>

    <filter id="borderShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-color="#000" flood-opacity="0.22"/>
    </filter>

    <linearGradient id="goldSheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7D774"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B88912"/>
    </linearGradient>
  </defs>

  <!-- Nền full icon -->
  <rect x="0" y="0" width="200" height="200" rx="44" ry="44" fill="url(#bgRadial)"/>

  <!-- Khung + monogram -->
  <g filter="url(#softShadow)">

    <!-- Viền ngoài lớn -->
    <rect x="10" y="10" width="180" height="180"
          rx="40"
          fill="none"
          stroke="url(#goldSheen)"
          stroke-width="2.4"
          filter="url(#borderShadow)"/>

    <!-- Viền trong lớn -->
    <rect x="18" y="18" width="164" height="164"
          rx="34"
          fill="none"
          stroke="url(#goldSheen)"
          stroke-width="1"
          stroke-opacity="0.55"/>

    <!-- Highlight mờ để tạo cảm giác raised -->
    <rect x="12.5" y="12.5" width="175" height="175"
          rx="38"
          fill="none"
          stroke="#FFFFFF"
          stroke-opacity="0.08"
          stroke-width="1.1"/>

    <!-- Icon to hơn + thấp xuống nhẹ -->
    <g transform="translate(0,15)">
      <g transform="translate(100 100) scale(2.05) translate(-100 -100)">

        <!-- H: bóng -->
        <path d="M80 80 V120 M120 80 V120 M80 100 H120"
              stroke="#000"
              stroke-opacity="0.25"
              stroke-width="4"
              stroke-linecap="square"
              transform="translate(0,1)"/>

        <!-- H: chính -->
        <path d="M80 80 V120 M120 80 V120 M80 100 H120"
              stroke="#FFFFFF"
              stroke-width="5"
              stroke-linecap="square"/>

        <!-- Roof: bóng -->
        <path d="M80 80 L100 65 L120 80"
              stroke="#000"
              stroke-opacity="0.22"
              stroke-width="4"
              fill="none"
              stroke-linecap="square"
              transform="translate(0,1)"/>

        <!-- Roof: chính -->
        <path d="M78 80 L100 65 L122 80"
              stroke="url(#goldSheen)"
              stroke-width="7"
              fill="none"
              stroke-linecap="square"/>
      </g>
    </g>

  </g>

</svg>